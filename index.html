<!DOCTYPE html>

  <style>

    body {
      margin: 0;
      font-family: Arial;
    }

    /* 上方選單 */

    .navbar {
  display: flex;
  align-items: center;
  padding-top: 40px;
  padding-bottom: 25px;
}


.right-area {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 50px;
}
    /* Logo */

    .logo img {
     margin-left: 40px;   /* LOGO 左邊空白 */
     margin-right: 50px; 
      width: 400px;

    }

    /* 右邊選單 */

    .menu {
      margin-left: 50px; 
      display: flex;

      align-items: center;

      gap: 30px;

    }

    /* 選單文字 */

    .menu a {

      text-decoration: none;

      color: #6b3e26;

      display: flex;

      flex-direction: column;

      align-items: center;

      font-size: 20px;

      font-weight: bold;
      white-space: nowrap;
    }

    .menu a:hover {

      opacity: 0.7;

    }
    .menu a span {

  font-size: 12px;

  margin-top: 8px;

  letter-spacing: 2px;

}

    /* 聯絡按鈕 */

    .contact-btn {

      background: white;

      border: 2px solid #6b3e26;

      padding: 12px 25px;

      border-radius: 10px;

      color: #6b3e26;
      text-align: center;


    }

    /* 電話按鈕 */

    .phone-btn {

      background: #6b3e26;

      color: white !important;

      padding: 12px 25px;

      border-radius: 10px;
      text-align: center;


    }

    /* 主視覺 */

    .hero {

      height: 700px;

      background-image: url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=1600&auto=format&fit=crop');

      background-size: cover;

      background-position: center;

      color: white;

      padding: 100px;

    }

    /* 大標題 */

    .hero-title {

      font-size: 60px;

      width: 500px;

      background: rgba(0,0,0,0.5);

      padding: 30px;

    }

  </style>

</head>
