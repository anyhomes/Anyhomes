<!DOCTYPE html>
<html>
<head>
  <title>台麻聴牌器</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Yu Gothic", sans-serif;
      background: #f8fbff;
      color: #333;
    }

    .mahjong-page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px 40px;
      text-align: center;
    }

    h1 {
      color: #6b3e26;
      font-size: 42px;
      margin-bottom: 20px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 50px;
    }

    .tiles {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 12px;
  margin-top: 40px;
}
.selected-tile {
  cursor: pointer;
  transition: 0.15s;
}

.selected-tile:hover {
  transform: translateY(-6px);
  filter: brightness(0.9);
}
.tiles button {
  height: 86px;
  background: linear-gradient(180deg, #ffffff, #f3efe8);
  border: 2px solid #d8c7b5;
  border-radius: 14px;
  box-shadow: 0 6px 0 #b89f86, 0 10px 18px rgba(0,0,0,0.12);
  font-size: 38px;
  cursor: pointer;
  transition: 0.15s;
}
.tile-img {
  width: 58px;
  height: auto;
}
.tiles button span {
  display: block;
  margin-top: 4px;
  font-size: 13px;
  color: #6b3e26;
  font-weight: bold;
}

.tiles button:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 0 #b89f86, 0 14px 24px rgba(0,0,0,0.16);
}

.tiles button:active {
  transform: translateY(3px);
  box-shadow: 0 3px 0 #b89f86, 0 6px 12px rgba(0,0,0,0.12);
}

    .hand,
    .result {
      background: white;
      margin-top: 50px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      font-size: 20px;
      min-height: 80px;
    }

    .reset-btn {
      margin-top: 30px;
      padding: 15px 40px;
      border: none;
      border-radius: 12px;
      background: #6b3e26;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }
    .shanten-text {
  margin-top: 18px;
  color: #6b3e26;
  font-size: 26px;
  font-weight: bold;
}
  </style>
</head>

<body>

  <div class="mahjong-page">

    <h1>台麻聴牌器</h1>

    <p class="subtitle">
      16張の手牌を選択すると、聴牌候補を確認できます。
    </p>

    <div class="tiles" id="tiles"></div>

    <div class="hand">
      <strong>現在の手牌：</strong>
      <div id="hand"></div>
    </div>

    <div class="result">
      <strong>結果：</strong>
      <div id="result">16張を選択してください。</div>
    </div>

    <button class="reset-btn" onclick="resetHand()">リセット</button>

  </div>

 <script>
  const tileData = [
    ["1m.png", 0], ["2m.png", 1], ["3m.png", 2], ["4m.png", 3], ["5m.png", 4], ["6m.png", 5], ["7m.png", 6], ["8m.png", 7], ["9m.png", 8],
    ["1p.png", 9], ["2p.png", 10], ["3p.png", 11], ["4p.png", 12], ["5p.png", 13], ["6p.png", 14], ["7p.png", 15], ["8p.png", 16], ["9p.png", 17],
    ["1s.png", 18], ["2s.png", 19], ["3s.png", 20], ["4s.png", 21], ["5s.png", 22], ["6s.png", 23], ["7s.png", 24], ["8s.png", 25], ["9s.png", 26],
    ["east.png", 27], ["south.png", 28], ["west.png", 29], ["north.png", 30],  ["chun.png", 31],["hatsu.png", 32], ["haku.png", 33],
  ];

  let hand = [];

  const tilesDiv = document.getElementById("tiles");
  const handDiv = document.getElementById("hand");
  const resultDiv = document.getElementById("result");

  tileData.forEach(([img, id]) => {
  const button = document.createElement("button");

  button.innerHTML = `
    <img src="images/${img}" class="tile-img">
  `;

  button.onclick = () => addTile(id);

  tilesDiv.appendChild(button);
});


  function addTile(id) {
    const count = hand.filter(t => t === id).length;

    if (count >= 4) {
      alert("同じ牌は4枚までです。");
      return;
    }

    if (hand.length >= 16) {
      alert("16張まで選択できます。");
      return;
    }

    hand.push(id);
    updateHand();
  }

  function updateHand() {
    hand.sort((a, b) => a - b);

   handDiv.innerHTML = hand.map((id, index) =>
  `<img 
    src="images/${tileData[id][0]}" 
    class="tile-img selected-tile"
    onclick="removeTile(${index})"
    title="クリックで削除"
  >`
).join("");

    if (hand.length < 16) {
      resultDiv.innerHTML = "あと " + (16 - hand.length) + " 張選択してください。";
      return;
    }

    const waits = getTenpaiTiles(hand);

   if (waits.length === 0) {
  const shanten = getSimpleShanten(hand);

  resultDiv.innerHTML = `
    <div>聴牌していません。</div>
    <div class="shanten-text">現在：${shanten}</div>
  `;
} else {
  resultDiv.innerHTML =
    "聴牌：" +
    waits.map(id =>
      `<img src="images/${tileData[id][0]}" class="tile-img">`
    ).join("");
}
  }

  function resetHand() {
    hand = [];
    updateHand();
  }
function removeTile(index) {
  hand.splice(index, 1);
  updateHand();
}function getTenpaiTiles(hand) {
  const waits = [];

  for (let i = 0; i < 34; i++) {
    const count = hand.filter(t => t === i).length;

    if (count >= 4) continue;

    const testHand = [...hand, i];

    if (isWinningHand(testHand)) {
      waits.push(i);
    }
  }

  return waits;
}
function getSimpleShanten(hand) {
  // 先檢查是否已經聽牌
  if (getTenpaiTiles(hand).length > 0) {
    return "聴牌";
  }

  // 1向聴判斷：
  // 從目前16張裡，試著打掉1張，再摸1張。
  // 如果摸完後可以變成聽牌，就算1向聴。
  for (let removeIndex = 0; removeIndex < hand.length; removeIndex++) {
    const afterDiscard = [...hand];
    afterDiscard.splice(removeIndex, 1);

    for (let draw = 0; draw < 34; draw++) {
      const count = afterDiscard.filter(t => t === draw).length;
      if (count >= 4) continue;

      const testHand = [...afterDiscard, draw];

      if (getTenpaiTiles(testHand).length > 0) {
        return "1向聴";
      }
    }
  }

  // 2向聴判斷：
  // 打1張、摸1張後，再打1張、摸1張，
  // 如果能變聽牌，就算2向聴。
  for (let removeIndex = 0; removeIndex < hand.length; removeIndex++) {
    const afterDiscard = [...hand];
    afterDiscard.splice(removeIndex, 1);

    for (let draw1 = 0; draw1 < 34; draw1++) {
      const count1 = afterDiscard.filter(t => t === draw1).length;
      if (count1 >= 4) continue;

      const handAfterDraw1 = [...afterDiscard, draw1];

      for (let removeIndex2 = 0; removeIndex2 < handAfterDraw1.length; removeIndex2++) {
        const afterDiscard2 = [...handAfterDraw1];
        afterDiscard2.splice(removeIndex2, 1);

        for (let draw2 = 0; draw2 < 34; draw2++) {
          const count2 = afterDiscard2.filter(t => t === draw2).length;
          if (count2 >= 4) continue;

          const testHand = [...afterDiscard2, draw2];

          if (getTenpaiTiles(testHand).length > 0) {
            return "2向聴";
          }
        }
      }
    }
  }

  return "3向聴以上";
}

  function isWinningHand(tiles) {
    if (tiles.length !== 17) return false;

    const counts = Array(34).fill(0);

    tiles.forEach(id => counts[id]++);

    for (let i = 0; i < 34; i++) {
      if (counts[i] >= 2) {
        counts[i] -= 2;

        if (canMakeMelds(counts)) {
          counts[i] += 2;
          return true;
        }

        counts[i] += 2;
      }
    }

    return false;
  }

  function canMakeMelds(counts) {
    let i = counts.findIndex(c => c > 0);

    if (i === -1) return true;

    // 刻子
    if (counts[i] >= 3) {
      counts[i] -= 3;

      if (canMakeMelds(counts)) {
        counts[i] += 3;
        return true;
      }

      counts[i] += 3;
    }

    // 順子：只有萬、筒、索可以
    const isSuitTile = i <= 26;
    const number = i % 9;

    if (
      isSuitTile &&
      number <= 6 &&
      counts[i + 1] > 0 &&
      counts[i + 2] > 0
    ) {
      counts[i]--;
      counts[i + 1]--;
      counts[i + 2]--;

      if (canMakeMelds(counts)) {
        counts[i]++;
        counts[i + 1]++;
        counts[i + 2]++;
        return true;
      }

      counts[i]++;
      counts[i + 1]++;
      counts[i + 2]++;
    }

    return false;
  }
</script>

</body>
</html>
