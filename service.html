<!DOCTYPE html>
<html>

<head>
  <title>サービス</title>

  <style>

    body {
      margin: 0;
      font-family: Arial;
    }

    /* 上方選單 */

    .navbar {
  display: flex;
  align-items: center;
  padding-top: 30px;
  padding-bottom: 20px;
}




    /* Logo */

    .logo img {
     margin-left: 40px;   /* LOGO 左邊空白 */
     margin-right: 40px; 
      width: 300px;

    }

    /* 右邊選單 */

    .menu {
      margin-left: auto; 
      margin-right: 40px; 
      display: flex;

      align-items: center;

      gap: 30px;

    }
  


    /* 選單文字 */

    .menu a {

      text-decoration: none;

      color: #6b3e26;

      display: flex;

      flex-direction: column;

      align-items: center;

      font-size: 18px;

      font-weight: bold;
      white-space: nowrap;
    }

    .menu a:hover {

      opacity: 0.7;

    }
    .menu a span {

  font-size: 12px;

  margin-top: 8px;

  letter-spacing: 2px;

}

    /* 聯絡按鈕 */

    .contact-btn {

      background: white;

      border: 2px solid #6b3e26;

      padding: 12px 25px;

      border-radius: 10px;

      color: #6b3e26;
      text-align: center;


    }

    /* 電話按鈕 */

    .phone-btn {

      background: #6b3e26;

      color: white !important;

      padding: 12px 25px;

      border-radius: 10px;
      text-align: center;


    }

.company-page {
        display: flex;
        justify-content: center;
        margin-top: 10px;
        }
    
        .company-page img {
        width: 100%;
        max-width: 1400px;
        }
    
  

/* 左側 icon */
.support-icon {
  min-width: 120px;
  height: 120px;

  border-radius: 50%;

  background: #eef4ff;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 60px;

  color: #2d5db3;
}

/* 右側內容 */
.support-content {
  flex: 1;
}

/* 主標題 */
.support-content h2 {
  font-size: 24px;
  line-height: 1.7;

  color: #2d5db3;

  margin-bottom: 30px;
}

/* 下方 tag */
.support-tags {
  display: flex;
  flex-wrap: wrap;

  gap: 15px;
}

.support-tags span {
  background: #f5f8ff;

  color: #2d5db3;

  padding: 14px 22px;

  border-radius: 999px;

}
    
  </style>

</head>

<body>

  <!-- 上方導覽列 -->

  <div class="navbar">

    <!-- Logo -->

    <div class="logo">

      <img src="logo.png">

    </div>

    <!-- 右邊選單 -->

    <div class="menu">

      

        

  <a href="index.html">
    ホーム
    <span>HOME</span>
  </a>



  <a href="company.html">
    会社情報
    <span>COMPANY</span>
  </a>

  <a href="services.html">
    サービス
    <span>SERVICE</span>
  </a>

  <a href="news.html">
    お知らせ
    <span>NEWS</span>
  </a>




  <a href="contact.html" class="contact-btn">
    📩お問い合わせ
    <span>CONTACT</span>
  </a>

  <a href="" class="phone-btn">
    ☎ 080-8876-7488
  </a>
</div>
  </div>


    <div class="company-page">
      <img src="service.png" >
    
    </div>


  </div>

</div>
</div>

</body>

</html>
