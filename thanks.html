<!DOCTYPE html>
<html>

<head>
  <title>送信完了</title>

  <style>

    body {
      margin: 0;

      font-family: Arial;

      background:
      linear-gradient(
        135deg,
        #f8fbff 0%,
        #edf4ff 50%,
        #f7fbff 100%
      );

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;
    }

    .thanks-box {

      background: white;

      padding: 80px;

      border-radius: 30px;

      text-align: center;

      box-shadow: 0 10px 30px rgba(0,0,0,0.08);

      width: 600px;
    }

    .thanks-box h1 {

      color: #6b3e26;

      font-size: 50px;

      margin-bottom: 30px;
    }

    .thanks-box p {

      color: #666;

      font-size: 20px;

      line-height: 2;

      margin-bottom: 50px;
    }

    .thanks-btn {

      display: inline-block;

      background: #6b3e26;

      color: white;

      padding: 18px 45px;

      border-radius: 15px;

      text-decoration: none;

      font-weight: bold;
    }

  </style>

</head>

<body>

  <div class="thanks-box">

    <h1>送信完了</h1>

    <p>
      お問い合わせありがとうございました。<br>
      内容を確認後、担当者よりご連絡いたします。
    </p>

    <a href="index.html" class="thanks-btn">
      TOPへ戻る
    </a>

  </div>

</body>

</html>
